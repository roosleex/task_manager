{% load static %}
{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <title>Task manager</title>
</head>
<body class="d-flex flex-column min-vh-100">
    {% include 'nav.html' %}
    <h2 class="text-center">Delete Task</h2>
    <div class="container bg-white shadow-md p-1 text-center">
        <p>Are you sure that you want to delete this task? - {{ task.title }}</p>
        <a class="btn btn-danger" href="{% url 'dashboard' %}"> Cancel</a>
        <div class="mt-3">
            <form method="POST" action="">
                {% csrf_token %}
                <input class="btn btn-success" type="submit" value="Confirm deletion" >
            </form>
        </div>
    </div>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
